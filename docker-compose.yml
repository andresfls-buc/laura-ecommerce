

services:
  postgres:
    image: postgres:14
    container_name: laura_postgres
    restart: always
    environment:
      POSTGRES_USER: andres
      POSTGRES_PASSWORD: andres123
      POSTGRES_DB: laura_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: laura_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@laura.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
